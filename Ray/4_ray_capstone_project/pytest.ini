[pytest]
pythonpath = .

# Default command-line options - always verbose and show print statements
addopts = -v -s --strict-markers

# Custom markers for test selection
markers =
    full: internal marker for full-mode-only tests (use --full flag, not -m full)

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*
